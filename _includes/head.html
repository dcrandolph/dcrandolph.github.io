<head>
  <meta charset="utf-8">
  <meta http-transform="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == "production" and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <meta property="og:image" content="{{ page.image | default: site.image | absolute_url }}" />
  <meta name="twitter:image" content="{{ page.image | default: site.image | absolute_url }}" />
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
</head>
